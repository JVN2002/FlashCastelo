
    <div class="cart-section">
						<h3 style="margin-top: 0; color: var(--amarelo);">Carrinho</h3>
						<div id="cartItems" class="cart-items">
							<span style="color: var(--muted); text-align: center; font-size: 12px;">Vazio</span>
						</div>

						<div class="cart-summary">
							<div class="cart-line">
								<div>Subtotal:</div>
								<div style="text-align: right;" id="subtotal">R$ 0,00</div>
							</div>
							<div class="cart-line">
								<div>Desconto:</div>
								<div style="text-align: right;">
									<input type="number" id="discount" value="0" step="0.01" onchange="updateTotal()" style="width: 70px;">
								</div>
							</div>
							<div class="cart-total">
								<div id="total">R$ 0,00</div>
							</div>
						</div>

						<div style="padding: 12px; background: #1a2414; border: 1px solid #3a4a3a; border-radius: 8px; margin-bottom: 12px;">
							<h4 style="margin: 0 0 8px; color: #8ae08a; font-size: 13px;">💳 Pagamento</h4>
							<select id="paymentMethod" style="width: 100%; margin-bottom: 8px;">
								<option value="card">Cartão (Rede)</option>
								<option value="pix">PIX</option>
								<option value="cash">Dinheiro</option>
							</select>
							<div style="padding: 8px; background: #0f1a0f; border-radius: 4px; margin-top: 8px; font-size: 11px; color: #8ae08a;">
								<strong>Status Rede:</strong> Conectado ✓<br>
								<strong>POS:</strong> POS-001 (Laranjinha Smart)<br>
							</div>
						</div>

						<button class="btn-pay" onclick="finalizePay()">Processar Pagamento</button>
						<button class="btn-secondary" style="width: 100%; margin-top: 8px;" onclick="clearCart()">Limpar</button>
					</div>
