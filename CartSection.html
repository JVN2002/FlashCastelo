<div class="order-card-wrapper is-collapsed">
	<button class="order-card-toggle" type="button" onclick="openOrderCard()">
		🧾 Pedido em aberto (<span data-order-count>0</span>)
	</button>

	<div class="cart-section">
		<div class="cart-section-header" data-order-card-drag-handle>
			<h3 style="margin-top: 0; color: var(--amarelo);">Pedido para baixa</h3>
			<div class="cart-section-header-actions">
				<button class="cart-minimize-btn" type="button" onclick="minimizeOrderCard()" aria-label="Minimizar card do pedido">−</button>
				<button class="cart-close-btn" type="button" onclick="closeOrderCard()" aria-label="Fechar card do pedido">×</button>
			</div>
		</div>

		<div class="order-flow-status is-empty" data-order-flow-status>
			<div class="order-flow-title" data-order-flow-title>Sem pedido em aberto</div>
			<div class="order-flow-text" data-order-flow-text>Adicione itens para começar um novo pedido.</div>
		</div>

		<div id="cartItems" class="cart-items">
			<span style="color: var(--muted); text-align: center; font-size: 12px;">Vazio</span>
		</div>

		<div class="stock-consumption-card">
			<div class="stock-consumption-title">Itens que vão dar baixa no estoque</div>
			<div id="stockConsumptionItems" class="stock-consumption-items">
				<div class="stock-consumption-empty">Sem itens selecionados.</div>
			</div>
		</div>

		<div class="cart-summary">
			<div class="cart-line">
				<div>Subtotal:</div>
				<div style="text-align: right;" id="subtotal">R$ 0,00</div>
			</div>
			<div class="cart-line">
				<div>Desconto:</div>
				<div style="text-align: right;">
					<input type="number" id="discount" value="0" step="0.01" onchange="updateTotal()" style="width: 70px;">
				</div>
			</div>
			<div class="cart-total">
				<div id="total">R$ 0,00</div>
			</div>
		</div>

		<button class="btn-pay" onclick="finalizeOrderFromCard()">Cobrar na maquininha e dar baixa</button>
		<button class="btn-secondary" style="width: 100%; margin-top: 8px;" onclick="clearCart()">Limpar pedido</button>
	</div>
</div>

<div id="confirmation-window" class="Hidde">
	<div class="confirm-cart-section">
		<div class="cart-window">
			<button onclick="esconder()" class="X">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
					<path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
					<path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
				</svg>
			</button>
			<h3>Carrinho</h3>
			<div class="cart-list">
				<div id="finalCartItens" class="cart-itens-confirm">
					
				</div>
			</div>
			<p class="price"><b>TOTAL: R$<samp id="totalConfirm"></samp></b></p>
			<p class="paymantMet" >Método de pagamento <b id="modalMethod"></b></p>
			<button onclick="finalizaCompra()" class="btnConfirm">Confirmar</button>
		</div>
	</div>
</div>
